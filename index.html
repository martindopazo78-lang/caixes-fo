const res = document.getElementById('results');
q.addEventListener('input', () => {

  if (v.length < 2) { res.innerHTML = '<div class="msg"><div class="msg-icon">🔍</div>Escriu per cercar</div>'; return; }
  const hits = D.filter(c => c.n && c.n.toLowerCase().includes(v)).slice(0, 50);

    return `<div class="card">
      <div>

      </div>
      <a class="maps-btn" href="${mapsUrl}" target="_blank" rel="noopener">📍</a>

  }).join('');
});
